---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name litellm
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        # Database
        DATABASE_URL: "postgresql://{{ .DBUSER }}:{{ .DBPASS }}@postgres-rw.database.svc.cluster.local:5432/litellm"
        INIT_POSTGRES_DBNAME: &dbName litellm
        INIT_POSTGRES_HOST: &dbHost postgres-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: '{{ .DBUSER }}'
        INIT_POSTGRES_PASS: '{{ .DBPASS }}'
        INIT_POSTGRES_SUPER_PASS: '{{ .POSTGRES_SUPER_PASS }}'
        # LiteLLM
        LITELLM_MASTER_KEY: '{{ .LITELLM_MASTER_KEY }}'
        LITELLM_SALT_KEY: '{{ .LITELLM_SALT_KEY }}'
        # Provider API keys (for pr-reviewer-action model tiers)
        OPENCODE_API_KEY: '{{ .OPENCODE_API_KEY }}'
        MINIMAX_API_KEY: '{{ .MINIMAX_API_KEY }}'
        NEURALWATT_API_KEY: '{{ .NEURALWATT_API_KEY }}'
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: litellm
  - extract:
      key: cloudnative-pg-superuser
