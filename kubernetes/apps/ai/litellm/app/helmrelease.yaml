---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app litellm
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17
            envFrom:
              - secretRef:
                  name: *app
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.92.0
            args: ["--config", "/config/config.yaml", "--port", "4000"]
            env:
              LITELLM_MODE: PRODUCTION
              LITELLM_LOG: INFO
              LITELLM_LOCAL_MODEL_COST_MAP: "False"
              STORE_MODEL_IN_DB: "True"
              PROXY_BASE_URL: https://litellm.${SECRET_DOMAIN}
              LITELLM_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: *app
                    key: LITELLM_MASTER_KEY
            envFrom:
              - secretRef:
                  name: *app
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 2Gi
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 5
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      enableServiceLinks: false
      terminationGracePeriodSeconds: 120
      securityContext:
        seccompProfile: { type: RuntimeDefault }
    service:
      litellm:
        controller: *app
        ports:
          http:
            port: 4000
    route:
      main:
        hostnames:
          - "litellm.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      config:
        type: configMap
        name: litellm-config
        globalMounts:
          - path: /config
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
