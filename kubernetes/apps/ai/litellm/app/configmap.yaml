---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      # Local models
      # Strix NPU via Lemonade (vision-capable, single-tenant)
      - model_name: gemma3-4b-FLM
        model_info:
          mode: chat
          max_input_tokens: 16384
          max_output_tokens: 8192
          supports_function_calling: false
          supports_vision: true
        litellm_params:
          model: openai/gemma3-4b-FLM
          api_base: https://lemonade.russhome.xyz/api/v1
          api_key: "dummy"
          drop_params: true
          max_parallel_requests: 1

      - model_name: ornith-1.0-35b
        model_info:
          mode: chat
          input_cost_per_token: 0.0000001250
          cache_creation_input_token_cost: 0.0000001250
          cache_read_input_token_cost: 0.0000000125
          output_cost_per_token: 0.0000004999
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: false
        litellm_params:
          model: openai/ornith-1.0-35b
          api_base: http://local-ai.russhome.xyz:8080/v1
          api_key: "dummy"
          max_parallel_requests: 1
          additional_drop_params: ["response_format"]

      - model_name: qwen3.6-35b
        model_info:
          mode: chat
          input_cost_per_token: 0.0000001250
          cache_creation_input_token_cost: 0.0000001250
          cache_read_input_token_cost: 0.0000000125
          output_cost_per_token: 0.0000004999
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: false
        litellm_params:
          model: openai/qwen3.6-35b
          api_base: http://local-ai.russhome.xyz:8080/v1
          api_key: "dummy"

      - model_name: qwen3.6-27b
        model_info:
          mode: chat
          input_cost_per_token: 0.0000001250
          cache_creation_input_token_cost: 0.0000001250
          cache_read_input_token_cost: 0.0000000125
          output_cost_per_token: 0.0000004999
          max_input_tokens: 262144
          max_output_tokens: 16384
          supports_function_calling: true
          supports_vision: false
        litellm_params:
          model: openai/qwen3.6-27b
          api_base: http://local-ai.russhome.xyz:8080/v1
          api_key: "dummy"

      # DeepSeek V4 Flash Free via OpenCode/zen
      - model_name: deepseek-v4-flash-free
        model_info:
          input_cost_per_token: 0.0000001400
          cache_creation_input_token_cost: 0.0000001400
          cache_read_input_token_cost: 0.0000000280
          output_cost_per_token: 0.0000002800
          mode: chat
          max_input_tokens: 1000000
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/deepseek-v4-flash-free
          api_base: https://opencode.ai/zen/v1
          api_key: os.environ/OPENCODE_API_KEY
          extra_body:
            thinking:
              type: disabled
          merge_reasoning_content_in_choices: true

      # OpenAI-compatible M3 clients
      - model_name: MiniMax-M3-chat
        model_info:
          mode: chat
          input_cost_per_token: 0.0000003000
          output_cost_per_token: 0.0000012000
          max_input_tokens: 1000000
          max_output_tokens: 131072
          supports_function_calling: true
        litellm_params:
          model: openai/MiniMax-M3
          api_base: https://api.minimax.io/v1
          api_key: os.environ/MINIMAX_API_KEY

      # Anthropic compatible M3 clients (Openclaw).
      - model_name: MiniMax-M3
        model_info:
          mode: messages
          input_cost_per_token: 0.0000003000
          cache_creation_input_token_cost: 0.0000003750
          cache_read_input_token_cost: 0.0000000600
          output_cost_per_token: 0.0000012000
          max_input_tokens: 204800
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true
          supports_vision: false
        litellm_params:
          model: minimax/MiniMax-M3
          api_base: https://api.minimax.io/anthropic/v1/messages
          api_key: os.environ/MINIMAX_API_KEY
          cache_control_injection_points:
            - location: message
              role: system
            - location: message
              index: -1

      - model_name: MiniMax-M2.7
        model_info:
          mode: messages
          input_cost_per_token: 0.0000003000
          cache_creation_input_token_cost: 0.0000003750
          cache_read_input_token_cost: 0.0000000600
          output_cost_per_token: 0.0000012000
          max_input_tokens: 204800
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true
          supports_vision: false
        litellm_params:
          model: minimax/MiniMax-M2.7
          api_base: https://api.minimax.io/anthropic/v1/messages
          api_key: os.environ/MINIMAX_API_KEY
          cache_control_injection_points:
            - location: message
              role: system
            - location: message
              index: -1

      - model_name: glm-5.2
        model_info:
          input_cost_per_token: 0.0000014500
          cache_creation_input_token_cost: 0.0000014500
          cache_read_input_token_cost: 0.0000003600
          output_cost_per_token: 0.0000045000
          mode: chat
          max_input_tokens: 1048560
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
        litellm_params:
          model: openai/glm-5.2
          api_base: https://api.neuralwatt.com/v1
          api_key: os.environ/NEURALWATT_API_KEY

      - model_name: kimi-k2.7
        model_info:
          input_cost_per_token: 0.0000009500
          cache_creation_input_token_cost: 0.0000009500
          cache_read_input_token_cost: 0.0000002400
          output_cost_per_token: 0.0000040000
          mode: chat
          max_input_tokens: 262128
          max_output_tokens: 16384
          supports_function_calling: true
          supports_prompt_caching: true
          supports_vision: true
        litellm_params:
          model: openai/kimi-k2.7-code
          api_base: https://api.neuralwatt.com/v1
          api_key: os.environ/NEURALWATT_API_KEY
          order: 2