---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      ollama:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          ollama:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.18.0
            env:
              OLLAMA_MODELS: &modelPath /models
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_VULKAN: "1"
              OLLAMA_FLASH_ATTENTION: "false"
              OLLAMA_NUM_GPU: "999"
              GGML_VK_DISABLE_INTEGER_DOT_PRODUCT: 1
            resources:
              requests:
                cpu: 200m
                gpu.intel.com/i915: 1
              limits:
                memory: 16Gi
                gpu.intel.com/i915: 1
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - topologyKey: "kubernetes.io/hostname"
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values: [ *app ]
    service:
      ollama:
        controller: ollama
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.20.69.125
          external-dns.alpha.kubernetes.io/hostname: ollama.${SECRET_DOMAIN}
        ports:
          http:
            port: 11434
    persistence:
      ollama:
        existingClaim: *app
        globalMounts:
          - path: *modelPath
            subPath: models
          - path: /root/.ollama
            subPath: config
      dri:
        type: hostPath
        hostPath: /dev/dri
