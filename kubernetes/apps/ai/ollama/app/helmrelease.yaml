---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ollama
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      ollama:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          ollama:
            image:
              repository: ghcr.io/rust84/ollama-ov
              tag: latest@sha256:52753e475c82f604b1255d35a06310b8dd007543547266cce41d45bc9b268817
            # command:
            #   - /bin/sh
            #   - -c
            #   - mkdir -p /llm/ollama && cd /llm/ollama && init-ollama && exec ./ollama serve
            securityContext:
              privileged: false
              capabilities:
                add:
                  - SYS_ADMIN
            env:
              OLLAMA_MODELS: &modelPath /models
              no_proxy: localhost,127.0.0.1
              OLLAMA_HOST: 0.0.0.0
              DEVICE: Arc
              OLLAMA_INTEL_GPU: true
              OLLAMA_NUM_GPU: 999
              ZES_ENABLE_SYSMAN: 1
              # OpenVINO specific
              GGML_OPENVINO_DEVICE: GPU
              GGML_OPENVINO_PROFILING: 1
              GGML_OPENVINO_STATEFUL_EXECUTION: 1
              GGML_OPENVINO_CACHE_DIR: /tmp/ov_cache
            resources:
              requests:
                cpu: 200m
                gpu.intel.com/i915: 1
              limits:
                memory: 12Gi
                gpu.intel.com/i915: 1
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - topologyKey: "kubernetes.io/hostname"
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values: [ *app ]
    service:
      ollama:
        controller: ollama
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.20.69.125
          external-dns.alpha.kubernetes.io/hostname: ollama.${SECRET_DOMAIN}
        ports:
          http:
            port: 11434
    persistence:
      ollama:
        existingClaim: *app
        globalMounts:
          - path: *modelPath
            subPath: models
          - path: /root/.ollama
            subPath: config
      dri:
        type: hostPath
        hostPath: /dev/dri
      cache:
        type: emptyDir
        globalMounts:
          - path: /tmp/ov_cache
