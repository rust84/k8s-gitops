---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless-ai
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      paperless-ai:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/clusterzx/paperless-ai
              tag: 3.0.9@sha256:2b65888163fd59716f1c8285b31c5bd0b30c9c3c192c42b516688e3887d4ba60
            env:
              TZ: ${TZ}
              PAPERLESS_API_URL: http://paperless.selfhosted.svc.cluster.local:8000/api
              PROCESS_PREDEFINED_DOCUMENTS: "yes"
              USE_EXISTING_DATA: "yes"
              RESTRICT_TO_EXISTING_TAGS: "yes"
              RESTRICT_TO_EXISTING_DOCUMENT_TYPES: "yes"
              SCAN_INTERVAL: "*/30 * * * *"
              TAGS: AI
              ADD_AI_PROCESSED_TAG: "yes"
              AI_PROCESSED_TAG_NAME: ai-processed
              AI_PROVIDER: custom
              CUSTOM_BASE_URL: http://litellm.ai.svc.cluster.local:4000/v1
              CUSTOM_MODEL: gemma3-4b-FLM
              RAG_SERVICE_ENABLED: false
              RAG_SERVICE_URL: http://localhost:8000
            envFrom:
              - secretRef:
                  name: paperless-ai-secret
            probes:
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  periodSeconds: 10
                  failureThreshold: 30
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  periodSeconds: 10
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: *app
        ports:
          http:
            port: 3000

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /app/data
      cache:
        type: emptyDir
        globalMounts:
          - path: /app/public/images
      home:
        type: emptyDir
        globalMounts:
          - path: /home/node/.pm2
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/logs
      openapi:
        type: emptyDir
        globalMounts:
          - path: /app/OPENAPI
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      nltk:
        type: emptyDir
        sizeLimit: 100Mi
        globalMounts:
          - path: /home/node/nltk_data
      hf-cache:
        type: emptyDir
        sizeLimit: 1Gi
        globalMounts:
          - path: /home/node/.cache
