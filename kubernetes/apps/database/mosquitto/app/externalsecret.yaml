---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mosquitto
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mosquitto-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Mosquitto password file format: one line per user
        # Each line: username:$id$salt$hash
        # Generate with: echo -n "password" | mosquitto_passwd -C - -c username
        passwd: |
          {{ .mqtt_password }}
  dataFrom:
    - extract:
        key: mosquitto
