---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault

    configMaps:
      config:
        data:
          mosquitto.conf: |
            # Authentication: allow both anonymous and authenticated clients
            allow_anonymous true
            password_file /mosquitto/config/passwd

            # Persistence
            persistence true
            persistence_location /data
            autosave_interval 60

            # Performance & Logging
            connection_messages false
            per_listener_settings false

            # Standard MQTT listener
            listener 1883 0.0.0.0
            protocol mqtt

            # WebSocket listener (for web clients)
            listener 9001 0.0.0.0
            protocol websockets

    controllers:
      mosquitto:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: public.ecr.aws/docker/library/eclipse-mosquitto
              tag: 2.0.22@sha256:212f89e1eaeb2c322d6441b64396e3346026674db8fa9c27beac293405c32b3c
            env:
              TZ: "${TZ}"
            probes:
              liveness:
                enabled: true
                type: TCP
                spec:
                  port: 1883
              readiness:
                enabled: true
                type: TCP
                spec:
                  port: 1883
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: true

    persistence:
      data:
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /data
      config-file:
        type: configMap
        name: mosquitto
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
            readOnly: true
      passwd-file:
        type: secret
        name: mosquitto-secret
        globalMounts:
          - path: /mosquitto/config/passwd
            subPath: passwd
            readOnly: true

    service:
      mqtt:
        controller: mosquitto
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: 10.20.69.122
        ports:
          mqtt:
            port: 1883
            protocol: TCP
          websocket:
            port: 9001
            protocol: TCP
